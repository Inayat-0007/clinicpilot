name: ClinicPilot CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      # FIX #27: Removed '|| true' — CI must fail on TypeScript errors, lint errors, and vulnerabilities.
      # Previously these steps always passed regardless of errors, giving false confidence.
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm audit --audit-level=high
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy
          SKIP_ENV_VALIDATION: 'true'
          PII_SALT: ${{ secrets.PII_SALT }}

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

  deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    needs: [quality, secret-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Run database migrations
        run: supabase db push --db-url ${{ secrets.SUPABASE_DB_URL }}
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod
      - name: Smoke test production
        run: |
          echo "Waiting for deploy to propagate..."
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://clinicpilot.in/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "SMOKE TEST FAILED: Health endpoint returned $STATUS"
            exit 1
          fi
          echo "Smoke test passed. Production is healthy."
